name: Update comics manifest

on:
  push:
    branches: [main]
    paths:
      - 'images/comics/**'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          cd images/comics
          python3 - <<'EOF'
          import os, json
          exts = {'.jpg', '.jpeg', '.png', '.webp', '.gif'}
          files = sorted(
            f for f in os.listdir('.')
            if os.path.splitext(f)[1].lower() in exts
          )
          with open('manifest.json', 'w') as fh:
            json.dump(files, fh, indent=2)
          print(f"Wrote {len(files)} entries to manifest.json")
          EOF

      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/comics/manifest.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update comics manifest [skip ci]" && git push
